apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: ab-eval-flow
  labels:
    app.kubernetes.io/part-of: abevalflow
    app.kubernetes.io/name: litellm
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/part-of: abevalflow
    spec:
      serviceAccountName: litellm
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-v1.82.6
          ports:
            - containerPort: 4000
              name: http
          args:
            - "--config"
            - "/app/config/config.yaml"
            - "--port"
            - "4000"
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-credentials
                  key: LITELLM_MASTER_KEY
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /app/credentials/gcp-sa-key.json
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: credentials
              mountPath: /app/credentials
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: credentials
          secret:
            secretName: litellm-credentials
            items:
              - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
                path: gcp-sa-key.json
