apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-push-images
  namespace: ab-eval-flow
spec:
  description: >-
    Builds treatment and control container images from scaffolded directories
    using Buildah (rootless, daemonless) and pushes them to the OpenShift
    internal registry. Emits digest-based image references for downstream tasks.
  params:
    - name: skill-name
      type: string
      description: Validated skill name (from validate-submission results)
    - name: treatment-task-dir
      type: string
      description: Path to the scaffolded treatment task directory
    - name: control-task-dir
      type: string
      description: Path to the scaffolded control task directory
    - name: commit-sha
      type: string
      description: Git commit SHA used for image tagging
    - name: registry-url
      type: string
      default: "image-registry.openshift-image-registry.svc:5000"
      description: Container registry URL
    - name: registry-namespace
      type: string
      default: "ab-eval-flow"
      description: Registry namespace / project name
  workspaces:
    - name: source
      description: Workspace containing the scaffolded task directories
  results:
    - name: treatment-image-ref
      description: Digest-based reference for the treatment image
    - name: control-image-ref
      description: Digest-based reference for the control image
  steps:
    - name: build-push-treatment
      image: registry.access.redhat.com/ubi9/buildah:latest
      securityContext:
        capabilities:
          add: ["SETFCAP"]
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        CONTEXT_DIR="$(params.treatment-task-dir)/environment"
        IMAGE_TAG="$(params.registry-url)/$(params.registry-namespace)/$(params.skill-name):treatment-$(params.commit-sha)"
        REGISTRY="$(params.registry-url)"

        buildah login \
          --tls-verify=false \
          -u serviceaccount \
          -p "$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
          "$REGISTRY"

        buildah build \
          --storage-driver=vfs \
          -t "$IMAGE_TAG" \
          "$CONTEXT_DIR"

        buildah push \
          --storage-driver=vfs \
          --tls-verify=false \
          --digestfile /tmp/treatment-digest \
          "$IMAGE_TAG" \
          "docker://$IMAGE_TAG"

        DIGEST=$(cat /tmp/treatment-digest)
        IMAGE_REF="$(params.registry-url)/$(params.registry-namespace)/$(params.skill-name)@${DIGEST}"
        echo -n "$IMAGE_REF" > "$(results.treatment-image-ref.path)"
        echo "Pushed treatment image: $IMAGE_REF"

    - name: build-push-control
      image: registry.access.redhat.com/ubi9/buildah:latest
      securityContext:
        capabilities:
          add: ["SETFCAP"]
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        CONTEXT_DIR="$(params.control-task-dir)/environment"
        IMAGE_TAG="$(params.registry-url)/$(params.registry-namespace)/$(params.skill-name):control-$(params.commit-sha)"
        REGISTRY="$(params.registry-url)"

        buildah login \
          --tls-verify=false \
          -u serviceaccount \
          -p "$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
          "$REGISTRY"

        buildah build \
          --storage-driver=vfs \
          -t "$IMAGE_TAG" \
          "$CONTEXT_DIR"

        buildah push \
          --storage-driver=vfs \
          --tls-verify=false \
          --digestfile /tmp/control-digest \
          "$IMAGE_TAG" \
          "docker://$IMAGE_TAG"

        DIGEST=$(cat /tmp/control-digest)
        IMAGE_REF="$(params.registry-url)/$(params.registry-namespace)/$(params.skill-name)@${DIGEST}"
        echo -n "$IMAGE_REF" > "$(results.control-image-ref.path)"
        echo "Pushed control image: $IMAGE_REF"
