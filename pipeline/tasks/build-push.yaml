apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-push-images
  namespace: ab-eval-flow
spec:
  description: >-
    Builds treatment and control container images from scaffolded directories
    using Buildah (rootless, daemonless) and pushes them to the OpenShift
    internal registry. Emits digest-based image references for downstream tasks.
    Uses --tls-verify=false because the OpenShift internal registry uses a
    cluster-signed certificate not trusted by the container runtime.
    SETFCAP capability is required for rootless Buildah (newuidmap/newgidmap).
  params:
    - name: skill-name
      type: string
      description: >-
        Submission name used for image tagging and registry path
        (skill, model comparison, prompt experiment, etc.)
    - name: treatment-task-dir
      type: string
      description: Path to the scaffolded treatment task directory
    - name: control-task-dir
      type: string
      description: Path to the scaffolded control task directory
    - name: commit-sha
      type: string
      description: Git commit SHA used for image tagging
    - name: registry-url
      type: string
      default: "image-registry.openshift-image-registry.svc:5000"
      description: Container registry URL
    - name: registry-namespace
      type: string
      default: "ab-eval-flow"
      description: Registry namespace / project name
  workspaces:
    - name: source
      description: Workspace containing the scaffolded task directories
  results:
    - name: treatment-image-ref
      description: Digest-based reference for the treatment image
    - name: control-image-ref
      description: Digest-based reference for the control image
  steps:
    - name: build-push-treatment
      image: registry.access.redhat.com/ubi9/buildah:9.6
      securityContext:
        capabilities:
          add: ["SETFCAP"]
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        build_and_push() {
          local variant="$1" context_dir="$2" result_path="$3"
          local image_tag="$(params.registry-url)/$(params.registry-namespace)/$(params.skill-name):${variant}-$(params.commit-sha)"

          buildah login \
            --tls-verify=false \
            -u serviceaccount \
            -p "$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
            "$(params.registry-url)"

          buildah build \
            --storage-driver=vfs \
            -t "$image_tag" \
            "$context_dir"

          buildah push \
            --storage-driver=vfs \
            --tls-verify=false \
            --digestfile "/tmp/${variant}-digest" \
            "$image_tag" \
            "docker://$image_tag"

          local digest
          digest=$(tr -d '\n' < "/tmp/${variant}-digest")
          local image_ref="$(params.registry-url)/$(params.registry-namespace)/$(params.skill-name)@${digest}"
          echo -n "$image_ref" > "$result_path"
          echo "Pushed ${variant} image: $image_ref"
        }

        build_and_push "treatment" \
          "$(params.treatment-task-dir)/environment" \
          "$(results.treatment-image-ref.path)"

    - name: build-push-control
      image: registry.access.redhat.com/ubi9/buildah:9.6
      securityContext:
        capabilities:
          add: ["SETFCAP"]
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        build_and_push() {
          local variant="$1" context_dir="$2" result_path="$3"
          local image_tag="$(params.registry-url)/$(params.registry-namespace)/$(params.skill-name):${variant}-$(params.commit-sha)"

          buildah login \
            --tls-verify=false \
            -u serviceaccount \
            -p "$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
            "$(params.registry-url)"

          buildah build \
            --storage-driver=vfs \
            -t "$image_tag" \
            "$context_dir"

          buildah push \
            --storage-driver=vfs \
            --tls-verify=false \
            --digestfile "/tmp/${variant}-digest" \
            "$image_tag" \
            "docker://$image_tag"

          local digest
          digest=$(tr -d '\n' < "/tmp/${variant}-digest")
          local image_ref="$(params.registry-url)/$(params.registry-namespace)/$(params.skill-name)@${digest}"
          echo -n "$image_ref" > "$result_path"
          echo "Pushed ${variant} image: $image_ref"
        }

        build_and_push "control" \
          "$(params.control-task-dir)/environment" \
          "$(results.control-image-ref.path)"
