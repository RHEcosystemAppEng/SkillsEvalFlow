apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: ab-eval-flow
spec:
  description: >-
    Minimal git-clone Task replacing the deprecated ClusterTask.
    Clones a repository at a given revision into the output workspace.
  params:
    - name: url
      type: string
      description: Repository URL to clone from
    - name: revision
      type: string
      default: "main"
      description: Revision to checkout (branch, tag, SHA)
  workspaces:
    - name: output
      description: Workspace to clone the repository into
  steps:
    - name: clone
      image: registry.access.redhat.com/ubi9/python-311:9.6
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        CHECKOUT_DIR="$(workspaces.output.path)"
        # Clean workspace before cloning (Tekton creates the dir)
        rm -rf "${CHECKOUT_DIR:?}"/{,.[!.],..?}* 2>/dev/null || true
        echo "Cloning $(params.url) @ $(params.revision) into $CHECKOUT_DIR"
        git clone --depth 1 --branch "$(params.revision)" \
          "$(params.url)" "$CHECKOUT_DIR"
        cd "$CHECKOUT_DIR"
        echo "Cloned at $(git rev-parse HEAD)"
