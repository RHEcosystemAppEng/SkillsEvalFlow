apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: scaffold-submission
  namespace: ab-eval-flow
spec:
  description: >-
    Generates skilled and unskilled Harbor task directories from a validated
    skill submission. Produces two output directories under the workspace for
    downstream build tasks.
  params:
    - name: skill-dir
      type: string
      description: Path to the skill directory within the workspace (e.g. my-skill)
    - name: skill-name
      type: string
      description: Validated skill name (from validate-submission results)
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
      description: URL of the ABEvalFlow pipeline repository
    - name: pipeline-repo-revision
      type: string
      default: "main"
      description: Branch or SHA of the pipeline repo to use for scripts and templates
  workspaces:
    - name: source
      description: Workspace containing the cloned submissions repository
  results:
    - name: skilled-task-dir
      description: Path to the scaffolded skilled task directory
    - name: unskilled-task-dir
      description: Path to the scaffolded unskilled task directory
  steps:
    - name: clone-pipeline-repo
      image: registry.access.redhat.com/ubi9/python-311:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR" ]; then
          echo "Pipeline repo already cloned, skipping"
        else
          git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
            "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        fi
        echo "Pipeline repo ready at $(params.pipeline-repo-revision)"

    - name: scaffold
      image: registry.access.redhat.com/ubi9/python-311:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        SUBMISSION_DIR="$(workspaces.source.path)/submissions/$(params.skill-dir)"
        OUTPUT_DIR="$(workspaces.source.path)"

        cd "$PIPELINE_DIR"
        pip install --quiet --no-cache-dir jinja2 pyyaml

        python scripts/scaffold.py "$SUBMISSION_DIR" "$OUTPUT_DIR"

        SKILLED_DIR="$OUTPUT_DIR/tasks/$(params.skill-name)"
        UNSKILLED_DIR="$OUTPUT_DIR/tasks-no-skills/$(params.skill-name)"

        echo -n "$SKILLED_DIR" > "$(results.skilled-task-dir.path)"
        echo -n "$UNSKILLED_DIR" > "$(results.unskilled-task-dir.path)"

        echo "Skilled dir:   $SKILLED_DIR"
        echo "Unskilled dir: $UNSKILLED_DIR"
        ls -la "$SKILLED_DIR"
        ls -la "$UNSKILLED_DIR"
