apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: scaffold-submission
  namespace: ab-eval-flow
spec:
  description: >-
    Generates treatment and control Harbor task directories from a validated
    submission. Produces two output directories under the workspace for
    downstream build tasks.
  params:
    - name: submission-dir
      type: string
      description: Path to the submission directory within the workspace (e.g. my-submission)
    - name: submission-name
      type: string
      description: Validated submission name (from validate-submission results)
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
      description: URL of the ABEvalFlow pipeline repository
    - name: pipeline-repo-revision
      type: string
      default: "main"
      description: Branch or SHA of the pipeline repo to use for scripts and templates
  workspaces:
    - name: source
      description: Workspace containing the cloned submissions repository
  results:
    - name: treatment-task-dir
      description: Path to the scaffolded treatment task directory
    - name: control-task-dir
      description: Path to the scaffolded control task directory
  steps:
    - name: clone-pipeline-repo
      image: registry.access.redhat.com/ubi9/python-311:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR" ]; then
          echo "Pipeline repo already cloned, skipping"
        else
          git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
            "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        fi
        echo "Pipeline repo ready at $(params.pipeline-repo-revision)"

    - name: scaffold
      image: registry.access.redhat.com/ubi9/python-311:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        SUBMISSION_DIR="$(workspaces.source.path)/submissions/$(params.submission-dir)"
        OUTPUT_DIR="$(workspaces.source.path)"

        cd "$PIPELINE_DIR"
        export PYTHONPATH="$PIPELINE_DIR"
        pip install --quiet --no-cache-dir jinja2 pyyaml pydantic

        python scripts/scaffold.py "$SUBMISSION_DIR" "$OUTPUT_DIR"

        TREATMENT_DIR="$OUTPUT_DIR/tasks-treatment/$(params.submission-name)"
        CONTROL_DIR="$OUTPUT_DIR/tasks-control/$(params.submission-name)"

        echo -n "$TREATMENT_DIR" > "$(results.treatment-task-dir.path)"
        echo -n "$CONTROL_DIR" > "$(results.control-task-dir.path)"

        echo "Treatment dir: $TREATMENT_DIR"
        echo "Control dir:   $CONTROL_DIR"
        ls -la "$TREATMENT_DIR"
        ls -la "$CONTROL_DIR"
