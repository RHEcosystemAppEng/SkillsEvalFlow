apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: store-results
  namespace: ab-eval-flow
spec:
  description: >-
    Persists A/B evaluation results from report.json to PostgreSQL.
    Reads the report directory produced by analyze-report, validates
    the JSON against the AnalysisResult Pydantic model, and inserts
    one EvaluationRun row plus per-trial rows. Idempotent on
    pipeline-run-id. Invokes any configured ResultsObservers after
    the DB commit.
  params:
    - name: report-dir
      type: string
      description: >-
        Path to the directory containing report.json and report.md
        (output of the analyze-report task)
    - name: submission-name
      type: string
      description: Submission name for logging
    - name: pipeline-run-id
      type: string
      description: >-
        Tekton PipelineRun name for idempotency. Typically set to
        $(context.pipelineRun.name) in the Pipeline definition.
    - name: pipeline-repo-url
      type: string
      default: "https://github.com/RHEcosystemAppEng/ABEvalFlow.git"
      description: URL of the pipeline repo containing scripts
    - name: pipeline-repo-revision
      type: string
      default: "main"
      # TODO: pin to a specific SHA once the pipeline stabilises — "main"
      # means each TaskRun pulls whatever is current, risking breakage.
      description: Branch or SHA of the pipeline repo to use for scripts
  workspaces:
    - name: source
      description: Shared workspace containing evaluation artifacts
  steps:
    - name: store-results
      image: registry.access.redhat.com/ubi9/python-311:9.6
      env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ab-eval-db-credentials
              key: database-url
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # --- 1. Clone pipeline repo (or update to requested revision) ---
        PIPELINE_DIR="$(workspaces.source.path)/_pipeline"
        if [ -d "$PIPELINE_DIR" ]; then
          echo "Pipeline repo exists, updating to requested revision"
          git -C "$PIPELINE_DIR" fetch origin "$(params.pipeline-repo-revision)" --depth 1
          git -C "$PIPELINE_DIR" checkout FETCH_HEAD
        else
          git clone --depth 1 --branch "$(params.pipeline-repo-revision)" \
            "$(params.pipeline-repo-url)" "$PIPELINE_DIR"
        fi

        cd "$PIPELINE_DIR"
        export PYTHONPATH="$PIPELINE_DIR"

        # --- 2. Install dependencies ---
        pip install --quiet --no-cache-dir pydantic sqlalchemy "psycopg[binary]" "tenacity>=8.2"

        # --- 3. Run store script ---
        echo "Storing results for submission=$(params.submission-name) run=$(params.pipeline-run-id)"
        python scripts/store_results.py \
          --report-dir "$(params.report-dir)" \
          --run-id "$(params.pipeline-run-id)"

        echo "Results stored successfully"
